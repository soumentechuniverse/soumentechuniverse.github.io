<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soumen Tech Universe - Premium Cyber Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #030712;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: #0f172a;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --secondary: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(56, 189, 248, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(129, 140, 248, 0.08) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .container {
            width: 92%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px 0;
        }

        /* --- Custom Scrollbar --- */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- Glassmorphism Card Utility --- */
        .glass-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* --- Glowing Buttons --- */
        .btn-glow {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px var(--primary-glow);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.5);
        }

        /* --- VIEW MANAGEMENT --- */
        .view-section { display: none; }
        .view-section.active { display: block; animation: smoothStep 0.5s ease-out; }

        @keyframes smoothStep {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PORTAL / LOGIN SCREEN --- */
        .portal-wrapper {
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .portal-card {
            width: 100%;
            max-width: 480px;
            padding: 40px;
            text-align: center;
        }

        .portal-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(2, 6, 23, 0.7);
            border: 1px solid #1e293b;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* --- DASHBOARD VIEW --- */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            margin-bottom: 30px;
        }

        .user-meta { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .stats-badge {
            background: rgba(30, 41, 59, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-badge i { color: #f59e0b; }

        /* --- 3D INTERACTIVE GRID --- */
        .grid-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 1px;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
        }

        .premium-card {
            background: #0f172a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            position: relative;
        }

        .premium-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.15);
        }

        .card-img-wrapper {
            position: relative;
            height: 180px;
            overflow: hidden;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(3, 7, 18, 0.8);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
            border: 1px solid var(--primary-glow);
        }

        .card-body { padding: 25px; }
        .card-body h3 { font-size: 1.25rem; margin-bottom: 10px; color: #fff; }
        .card-body p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        /* --- COURSE CONTENT PLATFORM --- */
        .workspace-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .back-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 20px;
            width: fit-content;
        }
        .back-nav:hover { color: var(--primary); }

        .article-view {
            padding: 35px;
            min-height: 400px;
        }

        .article-view h2 { font-size: 2rem; color: #fff; margin-bottom: 20px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .article-view h3 { color: var(--primary); margin: 25px 0 12px 0; }
        .article-view p { color: #e2e8f0; font-size: 1.05rem; line-height: 1.7; margin-bottom: 15px; }

        /* Simulated Code Box */
        .code-box {
            background: #020617;
            border-radius: 12px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            color: #34d399;
            margin: 20px 0;
            border: 1px solid #1e293b;
            position: relative;
            overflow-x: auto;
        }
        .code-box::before {
            content: "• • •";
            position: absolute;
            top: 5px;
            left: 15px;
            color: #64748b;
            font-size: 1.2rem;
        }
        .code-box code { display: block; margin-top: 15px; white-space: pre; }

        /* --- MULTI-QUESTION QUIZ SYSTEM --- */
        .premium-quiz {
            margin-top: 40px;
            padding: 35px;
            border-left: 4px solid var(--secondary);
        }

        .quiz-header-status {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .quiz-opt-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .quiz-opt-btn {
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid #1e293b;
            padding: 16px 20px;
            border-radius: 12px;
            color: var(--text-main);
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
        }

        .quiz-opt-btn:hover:not(:disabled) {
            border-color: var(--secondary);
            background: rgba(129, 140, 248, 0.05);
        }

        .quiz-opt-btn.correct-ans { background: rgba(16, 185, 129, 0.15) !important; border-color: var(--success) !important; color: #10b981; font-weight: bold; }
        .quiz-opt-btn.wrong-ans { background: rgba(239, 68, 68, 0.15) !important; border-color: var(--danger) !important; color: #ef4444; }

        /* Certificate / Badge box */
        .badge-unlock {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(251, 191, 36, 0.05));
            border: 1px dashed #f59e0b;
            border-radius: 16px;
            margin-top: 20px;
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 0 10px rgba(245, 158, 11, 0.1); }
            to { box-shadow: 0 0 25px rgba(245, 158, 11, 0.3); }
        }

    </style>
</head>
<body>

    <div class="container">

                    <div class="avatar" id="avatar-initial">S</div>

                        </div>

                        </div>

                        <div class="quiz-opt-grid" id="quiz-options-box">

                            Next Matrix Point <i class="fa-solid fa-chevron-right"></i>
                        </button>
                        <div id="module-completion-box" style="display: none;"></div>
                    </div>
                </main>
            </div>
        </section>

    </div>

        // --- AUTHENTICATION ENGINE ---
        function executePortalAuth(e) {
            e.preventDefault();
            const name = document.getElementById('username').value.trim();
            const dist = document.getElementById('district').value.trim();
            const phone = document.getElementById('userphone').value.trim();

            if (!name || !dist || phone.length < 10) {
                alert("Critical Error: Please enter valid credentials.");
                return;
            }

            if (authStep === 1) {
                document.getElementById('otp-wrapper').style.display = "block";
                document.getElementById('auth-btn').innerText = "Verify Access Code";
                alert(`[SECURE APP ALERTS] Verification Token dispatched to node. \n\n🔒 System Access OTP: ${systemSecureOTP}`);
                authStep = 2;
            } else {
                const enteredOTP = document.getElementById('otpcode').value.trim();
                if (enteredOTP === systemSecureOTP) {
                    currentStudent.name = name;
                    currentStudent.district = dist;
                    initializeStudentDashboard();
                } else {
                    alert("Security Refusal: Verification token mismatch.");
                }
            }
        }

        // --- DASHBOARD LIFECYCLE ---
        function initializeStudentDashboard() {
            document.getElementById('welcome-name').innerText = `Welcome, Officer ${currentStudent.name}`;
            document.getElementById('welcome-district').innerText = `Sector: ${currentStudent.district} Node`;
            document.getElementById('avatar-initial').innerText = currentStudent.name.charAt(0).toUpperCase();
            document.getElementById('score-counter').innerText = `${currentStudent.points} XP`;

            const gridContainer = document.getElementById('matrix-container');
            gridContainer.innerHTML = "";

            Object.keys(matrixDatabase).forEach(key => {
                const item = matrixDatabase[key];
                const card = document.createElement('div');
                card.className = "premium-card";
                card.onclick = () => launchLearningWorkspace(key);
                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${item.img}" alt="${item.title}">
                        <span class="card-badge">${item.badge}</span>
                    </div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                    </div>
                `;
                gridContainer.appendChild(card);
            });

            switchActiveView('dashboard-view');
        }

        // --- LERANING WORKSPACE MODULE ---
        function launchLearningWorkspace(courseId) {
            currentActiveCourseId = courseId;
            const targetCourse = matrixDatabase[courseId];
            
            document.getElementById('article-payload').innerHTML = targetCourse.htmlContent;
            
            // Initialize Quiz parameters
            currentQuizIndex = 0;
            activeQuizScore = 0;
            
            document.getElementById('quiz-block').style.display = "block";
            document.getElementById('module-completion-box').style.display = "none";
            
            renderQuizStep();
            switchActiveView('workspace-view');
        }

        function renderQuizStep() {
            const course = matrixDatabase[currentActiveCourseId];
            const activeQuiz = course.quizzes[currentQuizIndex];
            
            document.getElementById('quiz-question-number').innerText = `Assessment Node: ${currentQuizIndex + 1} of ${course.quizzes.length}`;
            document.getElementById('quiz-accumulated-score').innerText = `Session Points: ${activeQuizScore * 50} XP`;
            document.getElementById('quiz-question-text').innerText = activeQuiz.q;

            const optionsContainer = document.getElementById('quiz-options-box');
            optionsContainer.innerHTML = "";
            document.getElementById('quiz-next-btn').style.display = "none";

            activeQuiz.opts.forEach((optionText, idx) => {
                const optBtn = document.createElement('button');
                optBtn.className = "quiz-opt-btn";
                optBtn.innerText = optionText;
                optBtn.onclick = () => processSelectedAnswer(idx, activeQuiz.ans);
                optionsContainer.appendChild(optBtn);
            });
        }

        function processSelectedAnswer(selectedIdx, correctIdx) {
            const optionsButtons = document.getElementById('quiz-options-box').children;
            
            for (let i = 0; i < optionsButtons.length; i++) {
                optionsButtons[i].disabled = true;
                if (i === correctIdx) {
                    optionsButtons[i].classList.add('correct-ans');
                } else if (i === selectedIdx) {
                    optionsButtons[i].classList.add('wrong-ans');
                }
            }

            if (selectedIdx === correctIdx) {
                activeQuizScore++;
            }

            document.getElementById('quiz-next-btn').style.display = "block";
        }

        function advanceQuizQuestion() {
            currentQuizIndex++;
            const course = matrixDatabase[currentActiveCourseId];

            if (currentQuizIndex < course.quizzes.length) {
                renderQuizStep();
            } else {
                finalizeCourseModule();
            }
        }

        function finalizeCourseModule() {
            const totalEarnedXP = activeQuizScore * 50;
            currentStudent.points += totalEarnedXP;
            document.getElementById('score-counter').innerText = `${currentStudent.points} XP`;

            document.getElementById('quiz-question-number').innerText = "Assessment Concluded";
            document.getElementById('quiz-question-text').innerText = "Module Verification Complete";
            document.getElementById('quiz-options-box').innerHTML = "";
            document.getElementById('quiz-next-btn').style.display = "none";

            const completionBox = document.getElementById('module-completion-box');
            completionBox.style.display = "block";
            
            let statusBadgeHTML = "";
            if (activeQuizScore === courseLengthCheck()) {
                statusBadgeHTML = `
                    <div class="badge-unlock">
                        <i class="fa-solid fa-award" style="font-size: 2.5rem; color: #f59e0b; margin-bottom: 10px;"></i>
                        <h4 style="color: #f59e0b; font-size: 1.2rem; margin-bottom: 5px;">Elite Badge Unlocked!</h4>
                        <p style="font-size: 0.9rem; color: var(--text-muted);">You have verified absolute logic mastery over this subject zone.</p>
                    </div>
                `;
            }

            completionBox.innerHTML = `
                <p style="font-size: 1.1rem; margin-bottom: 15px; font-weight: 600;">You successfully processed ${activeQuizScore} out of ${courseLengthCheck()} matrix targets.</p>
                <p style="color: var(--primary); font-weight: bold; margin-bottom: 20px;">+ ${totalEarnedXP} Points allocated to your account.</p>
                ${statusBadgeHTML}
            `;
        }

        function courseLengthCheck() {
            return matrixDatabase[currentActiveCourseId].quizzes.length;
        }

        // --- NAVIGATION CONTROLS ---
        function navigateToDashboard() {
            switchActiveView('dashboard-view');
        }

        function switchActiveView(viewId) {
            document.querySelectorAll('.view-section').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
